# CI — runs the test suite on every push and pull request to main.
#
# This file is IDENTICAL across the 4 portfolio repos.
#
# Notes:
# - Tests are hermetic (all API calls mocked) — no secrets needed here.
# - `uv sync --frozen` installs exactly what uv.lock pins (fails if the lock
#   is out of date instead of silently re-resolving) and does NOT install
#   optional extras. In chat-with-pdf that keeps the `local` extra
#   (sentence-transformers + torch, ~800MB) out of CI.
# - The dev dependency group (pytest) IS installed by default by `uv sync`.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest
